# ============================================================================
# mapping.yaml — Diccionario de mapeo para Trend Monitoring (piloto LEAP)
# ============================================================================
# Traduce los nombres crudos de la hoja 'Buffer' de cada variante de motor
# a un conjunto de nombres CANÓNICOS comunes.
#
# Estructura:
#   - 'identity'    : campos que identifican el punto (sin unidad). Van a la
#                     tabla test_points como columnas.
#   - 'measurements': parámetros numéricos. Van a la tabla measurements en
#                     formato largo (un renglón por parámetro).
#
# Cada concepto canónico lista, por variante, el/los nombre(s) crudo(s) que le
# corresponden. Si una variante no tiene ese concepto, se omite.
#
# VERSIONADO: este archivo se versiona. Cualquier cambio de mapeo queda
# trazable (importante para auditoría).
# ============================================================================

version: 5
pilot: LEAP + CFM56
notes: >
  Núcleo confirmado contra 8 archivos 1A y 8 archivos 1B (todos 8/8).
  1A reporta en doble unidad (imperial + métrico); ambas se guardan.
  v2: se agregaron N1R/N1RKH, N2R2, WFK/WFMR2, FNR2 y el canonico nuevo 'w2'
  (W2AR/W2AR2), necesarios para la pagina de Correlacion vs Historico.
  Los puntos ya ingeridos ANTES de este cambio no tienen estas mediciones
  todavia: correr resync_measurements.py para rellenarlas sin duplicar.
  v3: se agregan CFM56-5A y CFM56-7B con nucleo minimo de tendencia:
  N1K, N2K, WFK, W2AR, EGTK, FNK, EGTHD, T2, P2 y T25.
  v4: se agregan OCPR/SFCK y presiones necesarias para calcular OCPR derivado
  en LEAP-1B (PS3/PT2psia) y CFM56-5A (PS3SEL/PAMB_psi).
  v5: se agregan PCELLF/PCELLR (presion de celda frente/trasera) como
  nombres crudos adicionales para 1A y 1B, y como canonico nuevo para
  CFM56-5A y CFM56-7B. CFM56-7B llama la trasera "PCELLR_abs" en el Buffer;
  se normaliza a "PCELLR" al leer (services/data_loader.py), sin tocar el
  dato crudo en motores.db. Correr resync_measurements.py para rellenar
  puntos ya ingeridos.

# ----------------------------------------------------------------------------
# CAMPOS DE IDENTIFICACIÓN (sin unidad) -> columnas de test_points
# ----------------------------------------------------------------------------
identity:
  serial_number:
    "1A": Serial Number
    "1B": Serial Number
    "CFM56-5A": Serial Number
    "CFM56-7B": Serial Number
  point_test_number:
    "1A": Point Test Number
    "1B": Point Test Number
    "CFM56-5A": Point Test Number
    "CFM56-7B": Point Test Number
  id_point:
    "1A": Id point
    "1B": Id point
    "CFM56-5A": Id point
    "CFM56-7B": Id point
  point_type:
    "1A": Point Type
    "1B": Point Type
    "CFM56-5A": Point Type
    "CFM56-7B": Point Type
  point_number:
    "1A": Point Number
    "1B": Point Number
    "CFM56-5A": Point Number
    "CFM56-7B": Point Number
  description:
    "1A": Description
    "1B": Description
    "CFM56-5A": Description
    "CFM56-7B": Description
  date:
    "1A": DATE
    "1B": DATE
    "CFM56-5A": DATE
    "CFM56-7B": DATE
  time:
    # TIME no se hallo en 1A en la extraccion; solo se mapea donde aparece.
    "1B": TIME
    "CFM56-5A": TIME
    "CFM56-7B": TIME

# ----------------------------------------------------------------------------
# MEDICIONES (con unidad) -> filas de measurements (formato largo)
# ----------------------------------------------------------------------------
# Cuando una variante tiene la misma magnitud en dos unidades (imperial y
# métrico), se listan ambos nombres crudos: cada uno se guarda como una
# medición separada con su propia unidad.
# ----------------------------------------------------------------------------
measurements:

  # --- Ambientales (para corrección ISA) ---
  p_amb:
    "1A": [PAMB, PAMBkPa]
    "1B": [PAMBpsia]
    "CFM56-5A": [PAMB_psi]
  t2:
    "1A": [T2]
    "1B": [T2]
    "CFM56-5A": [T2]
    "CFM56-7B": [T2]
  humidity:
    "1A": [HUM]
    "1B": [HUM, RH]

  # --- Motor primario ---
  n1:
    "1A": [N1, N1K, N1R]
    "1B": [N1, N1RKH]
    "CFM56-5A": [N1K]
    "CFM56-7B": [N1K]
  n2:
    "1A": [N2, N2K]
    "1B": [N2, N2R25, N2R2]
    "CFM56-5A": [N2K]
    "CFM56-7B": [N2K]
  fuel_flow:
    "1A": [WF36, WF36kgh, WFK]
    "1B": [WF36pph, WFMR2]
    "CFM56-5A": [WFK]
    "CFM56-7B": [WFK]
  thrust:
    "1A": [FN, FNK, FNdaN]
    "1B": [FNlbf, FNR2]
    "CFM56-5A": [FNK]
    "CFM56-7B": [FNK]
  fhv:
    "1B": [FHV]      # no presente en 1A

  # --- Flujo secundario (W2), usado en la correlacion de celda ---
  # Anadido para la comparacion Correlacion vs Historico (N1R/N2R/WFR/W2R/EGTR/FNR).
  w2:
    "1A": [W2AR]
    "1B": [W2AR2]
    "CFM56-5A": [W2AR]
    "CFM56-7B": [W2AR]

  # --- EGT (todos los niveles disponibles) ---
  # Cadenas distintas por variante (K en 1A, R2 en 1B). Se guardan todos.
  egt:
    "1A": [EGTMEAS, EGTK, EGTK1, EGTK2, EGTK3, EGTK3M, EGTHD, EGTHDM, EGTHD_MAR, EGTHDM_MAR]
    "1B": [EGTR2, EGTR2HD, EGTR2HDM]
    "CFM56-5A": [EGTK, EGTHD]
    "CFM56-7B": [EGTK, EGTHD]

  # --- Admisión / presión para CFM56 ---
  p2:
    "CFM56-5A": [P2]
    "CFM56-7B": [P2]
  t25:
    "CFM56-5A": [T25]
    "CFM56-7B": [T25]

  # --- Presiones / performance para tendencia ---
  ps3:
    "1B": [PS3]
    "CFM56-5A": [PS3SEL]
  pt2:
    "1B": [PT2psia]
  ocpr:
    "1A": [OCPR]
    "CFM56-7B": [OCPR]
  sfc:
    "1A": [SFCK_lbhlbf]
    "1B": [SFCK_lbhlbf]
    "CFM56-5A": [SFCK]
    "CFM56-7B": [SFCK]

  # --- Salud de celda ---
  p_cell_front:
    "1A": [FPCELL, FPCELLkPaa, PCELLF]
    "1B": [PCELLFpsig, PCELLF]
    "CFM56-5A": [PCELLF]
    "CFM56-7B": [PCELLF]
  p_cell_rear:
    "1A": [RPCELL, RPCELLkPaa, PCELLR]
    "1B": [PCELLRpsig, PCELLR]
    "CFM56-5A": [PCELLR]
    # CFM56-7B llama esta variable PCELLR_abs en el Buffer; se normaliza a
    # "PCELLR" en services/data_loader.py (mismo nombre que las demas
    # variantes en la app, sin tocar el crudo en motores.db).
    "CFM56-7B": [PCELLR_abs]

  # --- Modificadores de celda (factores de calibracion) ---
  # CRITICOS para auditoria: deben permanecer constantes entre reportes.
  # Un cambio entre reportes consecutivos = recalibracion de la celda.
  # 1A los llama FM* (Facility Modifier), 1B los llama CF* (Cell Factor).
  fm_fn:
    "1A": [FMFN]
  fm_egt:
    "1A": [FMEGT]
  fm_n1:
    "1A": [FMN1]
  fm_n2:
    "1A": [FMN2]
  fm_w2:
    "1A": [FMW2]
  fm_wf:
    "1A": [FMWF]
  cf_fn:
    "1B": [CFFN]
  cf_n2:
    "1B": [CFN2]
  cf_egt:
    "1B": [CFEGT]
  cf_w2a:
    "1B": [CFw2A]
  cf_wfm:
    "1B": [CFWFM]

# ----------------------------------------------------------------------------
# NORMALIZACIÓN DE UNIDADES
# La columna C trae unidades con espacios ("psi a"). Aquí se definen las
# sustituciones para dejarlas canónicas.
# ----------------------------------------------------------------------------
unit_normalization:
  "psi a": psia
  "psi g": psig
  "kPa a": kPaa
  "°C": degC
  "kg/h": kg_h
